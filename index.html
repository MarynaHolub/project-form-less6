<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="container">
      <form>
        <legend><h1>Купить в 1 клик</h1></legend>
        <div class="devider"></div>

        <div class="form-container">
          <div>
            <label for="fio">Ф.И.О.<span>*</span> </label>
          </div>
          <input class="form-container-input" type="text" name="author" id="fio" />

          <div>
            <label for="tel">Телефон <span>*</span> </label>
          </div>
          <input class="form-container-input" type="tel" name="author" id="tel" />

          <div class="permission">
            <input type="checkbox" name="author" id="pers-dan" />
            <label for="pers-dan"
              >Я согласен на <span>обработку персональных данных</span></label
            >
          </div>

          <div>
            <button class="btn">Отправить</button>
          </div>
        </div>
        
      </form>
    </div>
  </body>
</html>
